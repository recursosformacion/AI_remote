services:
  # La web de venta que diseñamos para gestionproyectos.com
  web:
    image: php:8.2-apache
    container_name: web_dominio
    restart: always
    command: ["bash", "-lc", "a2enmod rewrite && echo 'SetEnvIf X-Forwarded-Proto \"https\" HTTPS=on' > /etc/apache2/conf-enabled/zz-forwarded-https.conf && apache2-foreground"]
    environment:
      TZ: Europe/Madrid
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./html:/var/www/html # Aquí meterás los archivos .php y .css
    networks:
      - edge_net

  # El motor de IA (Ollama) - Corriendo en tu CPU
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_local
    restart: always
    cpus: "2.0"
    environment:
      TZ: CET-1CEST,M3.5.0/2,M10.5.0/3
    # Expone la API HTTP para que otros contenedores puedan consultarla directamente
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - edge_net

  ia_interfaz:
    image: lobehub/lobe-chat:latest
    container_name: ia_lobechat
    restart: always
    environment:
      TZ: Europe/Madrid
      OLLAMA_PROXY_URL: http://ollama:11434
      ENABLED_OLLAMA: "true"
      ENABLED_OPENAI: "false"
      OLLAMA_MODEL_LIST: qwen2.5:7b
    depends_on:
      - ollama
    networks:
      - edge_net

  # Servicio OpenClaw, construye desde el código local o usa una imagen preconstruida
  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    user: "1001:1001"
    restart: always
    # Sobrescribe el comando por defecto para que el gateway escuche en todas las interfaces
    command: ["node","openclaw.mjs","gateway","--allow-unconfigured","--bind","lan"]
    #ports:
      # "3000:18789"   # mapea el puerto 3000 del host al puerto 18789 del gateway en el contenedor
      # (el gateway escucha internamente en 18789 por defecto cuando se usa --bind lan)
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - TZ=Europe/Madrid
      - OLLAMA_API_KEY=ollama-local
      # Variables de entorno para APIs externas (OpenAI, Groq, etc.)
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1
      - OPENAI_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Estas variables permiten que OpenClaw use tus claves API para acceder a OpenRouter
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${AISTUDIO_API_KEY}
      - GOOGLE_API_KEY=${AISTUDIO_API_KEY}
      # Y la clave para xAI (la API de X)
      - XAI_API_KEY=${XAI_API_KEY}
      # Y la clave para tu bot de Telegram, si quieres usar esa integración
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Variables para configurar el gateway de OpenClaw
      - GATEWAY_TRUSTED_PROXIES=172.30.0.0/24
      - GATEWAY_CONTROL_UI_ALLOW_INSECURE_AUTH=true
      - GATEWAY_CONTROL_UI_DANGEROUSLY_DISABLE_DEVICE_AUTH=true
    volumes:
      - ./openclaw_data:/app/data
      - ./ops:/app/ops:ro
      # Persiste los datos de OpenClaw (configuración, agentes, etc.) entre reinicios
      - ./openclaw_home:/home/node/.openclaw
      - ./openclaw/skills:/app/skills  # Esto "inyecta" tus habilidades (skills) en el contenedor
      - /:/host_system:ro  # Mapea la raíz del servidor a la carpeta /host_system dentro del contenedor

    depends_on:
      - ollama
    networks:
      - edge_net

  # El gestor que pone orden y te da HTTPS (SSL) gratis
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: gestor_trafico
    environment:
      TZ: Europe/Madrid
      PUID: "1001"
      PGID: "1001"
    ports:
      - '80:80'   # Tráfico web normal
      - '443:443' # Tráfico seguro HTTPS
      - '127.0.0.1:81:81'   # Panel de control visual (solo local/túnel SSH)
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - ./data/nginx/custom/production-81-auth.conf:/etc/nginx/conf.d/production.conf
    restart: always
    networks:
      - edge_net

networks:
  edge_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
